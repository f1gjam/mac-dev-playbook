---
- name: Ensure /opt/kashif folder exists
  become: true
  become_method: sudo 
  file:
    path: /opt/kashif
    state: directory
    mode: 0755
    owner: kashif
  tags: opt1

- name: Ensure /opt is viewable in Finder
  shell: SetFile  -a  v  /opt
  become: true
  become_method: sudo 
  tags: opt2
  
- name: Create SSH config file
  blockinfile:
    create: yes
    path: ~/.ssh/config
    block: |
      Host github.com
          AddKeysToAgent yes
          UseKeychain yes
          IdentityFile ~/.ssh/f1gjam-github-private
  tags: ssh_config

- name: Create git config file
  blockinfile:
    create: yes
    path: ~/.gitconfig
    block: |
      [user]
        name = Kashif Ali
        email = kashif@unixcraft.uk
      [core]
        editor = nano
        excludesfile = /Users/kashif/.gitignore
      [color]
        ui = auto
  tags: git_config

- name: Create nanorc config file
  blockinfile:
    create: yes
    path: ~/.nanorc
    block: |
      include /usr/local/share/nano/*.nanorc
  tags: nanorc
