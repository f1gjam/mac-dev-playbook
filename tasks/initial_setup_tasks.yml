---
- name: Ensure /opt/kashif folder exists
  file:
    path: /opt/kashif
    state: directory
    mode: 0755
    owner: kashif

- name: Ensure /opt is viewable in Finder
  shell: SetFile  -a  v  /opt
  become: true
  become_method: sudo 
  
- name: Create SSH config file
  shell: |
    echo 'Host github.com
		AddKeysToAgent yes
		UseKeychain yes
		IdentityFile ~/.ssh/f1gjam-github-private' >> ~/.ssh/config
