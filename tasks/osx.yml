---

- name: Ensure /Users/kashif/dotfiles/.macos is executable
  become: true
  become_method: sudo
  file:
    path: /Users/kashif/dotfiles/.macos
    state: file
    mode: 0755
    owner: kashif
  tags: macos

# TODO: Use sudo once .osx can be run via root with no user interaction.
- name: Run .osx dotfiles.
  become: true
  shell: "{{ osx_script }}"
  changed_when: false
  tags: osx
