    path: /Applications/Slack.app
    pos: 5
  - name: Textual
    path: /Applications/Textual.app
    pos: 6
  - name: WhatsApp
    path: /Applications/WhatsApp.app
    pos: 7
  - name: Skype
    path: /Applications/Skype.app
    pos: 8
  - name: Viber
    path: /Applications/Viber.app
    pos: 9
  - name: Messages
    path: /Applications/Messages.app
    pos: 10
