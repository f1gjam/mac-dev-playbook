  - python
  - screen
  - ssh-copy-id
  - tig
  - tmux
  - tree
  - wget
  - zsh

homebrew_taps:
  - caskroom/cask
  - caskroom/versions

homebrew_cask_appdir: /Applications
homebrew_cask_apps:
