---
- name: Ensure /opt/kashif folder exists
  become: true
  become_method: sudo 
  file:
    path: /opt/kashif
    state: directory
    mode: 0755
    owner: kali
  tags: opt1

- name: Ensure /opt is viewable in Finder
  shell: SetFile  -a  v  /opt
  become: true
  become_method: sudo 
  tags: opt2
  
- name: Create SSH config file
  blockinfile:
    create: yes
    path: ~/.ssh/config
    block: |
      Host github.com
          AddKeysToAgent yes
          UseKeychain yes
          IdentityFile ~/.ssh/f1gjam-github-private
  tags: ssh_config

- name: Create git config file
  blockinfile:
    create: yes
    path: ~/.gitconfig
    block: |
      [user]
        name = Kashif Ali
        email = kashif@unixcraft.uk
      [core]
        editor = nano
        excludesfile = ~/.gitignore
      [color]
        ui = auto
  tags: git_config

- name: Create nanorc config file
  blockinfile:
    create: yes
    path: ~/.nanorc
    block: |
      include /usr/local/share/nano/*.nanorc
  tags: nanorc

- name: Create wgetrc config file
  blockinfile:
    create: yes
    path: ~/.wgetrc
    block: |
      continue = on
      check-certificate = off
      robots = off
      timeout = 60
      progress = bar
      timestamping = on
      no_parent = on
      tries = 3
      retry_connrefused = on
      trust_server_names = on
      follow_ftp = on
      adjust_extension = on
      server_response = on
      user_agent = Mozilla/5.0 (compatible; MSIE 9.0; Windows NT 6.1; Trident/5.0)
  tags: wgetrc



