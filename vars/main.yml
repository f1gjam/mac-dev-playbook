---
osx_script: "/Users/kali/dotfiles/.macos"


bash_it_repo: https://github.com/Bash-it/bash-it.git
bash_it_repo_accept_hostkey: yes
bash_it_repo_local_destination: ~/.bash_it

dotfiles_repo: git@github.com:f1gjam/dotfiles.git 
dotfiles_repo_accept_hostkey: yes
dotfiles_repo_local_destination: ~/dotfiles
dotfiles_home: ~/
dotfiles_files:
  - .bash_profile
  - .bashrc
  - .gitignore
  - .macos

homebrew_install_path: /usr/local/homebrew
homebrew_installed_packages:
  - ansible
  - bash
  - bash-completion
  - colordiff
  - curl
  - docker
  - docker-compose
  - docker-machine-nfs
  - dockutil
  - dos2unix
  - git
  - git-extras
  - httpie
  - imagemagick
  - micro
  - nano
  - python3
  - screen
  - ssh-copy-id
  - tig
  - tmux
  - tree
  - wget

homebrew_taps:
  - caskroom/cask
  - caskroom/versions
  - caskroom/fonts
  - caskroom/versions

homebrew_cask_appdir: /Applications
homebrew_cask_apps:
  - 1password
  - appcleaner
  - atom
  - cyberduck
  - firefox
  - font-roboto-mono-for-powerline
  - google-backup-and-sync
  - google-chrome
  - google-hangouts
  - jetbrains-toolbox
  - iterm2
  - java
  - java8
  - microsoft-remote-desktop-beta
  - skype
  - skypewebplugin
  - slack
  - teamviewer
  - textual
  - vagrant
  - viber
#  - virtualbox
  - viscosity
  - vlc
  - whatsapp

dockitems_to_remove:
  - Launchpad
  - Siri
  - Mail
  - Safari
  - Contacts
  - Calendar
  - Notes
  - Reminders
  - Maps
  - Photos
  - iTunes
  - iBooks
  - App Store
  - System Preferences

dockitems_to_persist:
  - name: Google Chrome
    path: "/Applications/Google Chrome.app"
    pos: 1
#  - name: IntelliJ IDEA CE
#    path: "/Applications/IntelliJ IDEA CE.app"
#    pos: 2
  - name: Atom
    path: "/Applications/Atom.app"
    pos: 3
  - name: iTerm
    path: "/Applications/iTerm.app"
    pos: 4
  - name: Slack
    path: /Applications/Slack.app
    pos: 5
#  - name: Textual
#    path: /Applications/Textual.app
#    pos: 6
  - name: WhatsApp
    path: /Applications/WhatsApp.app
    pos: 7
  - name: Skype
    path: /Applications/Skype.app
    pos: 8
  - name: Viber
    path: /Applications/Viber.app
    pos: 9
  - name: Messages
    path: /Applications/Messages.app
    pos: 10
  - name: FaceTime
    path: /Applications/FaceTime.app
    pos: 11
  - name: VirtualBox
    path: /Applications/VirtualBox.app
    pos: 12
  - name: Cyberduck
    path: /Applications/Cyberduck.app
    pos: 13


pip_packages:
  - flake8
  - pylint
  - pytest
  - pyinstaller
  - requests
  - yapf
